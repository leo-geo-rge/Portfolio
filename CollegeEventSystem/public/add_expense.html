<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
</head>
<body>
    <h2>Add Expense</h2>

    <form id="expenseForm">

        <!-- Event Dropdown -->
        <label>Select Event:</label><br>
        <select id="eventSelect" required></select>
        <br><br>

        <input type="text" id="type" placeholder="Expense Type" required><br><br>
        <input type="number" id="amount" placeholder="Amount" required><br><br>
        <input type="date" id="date" required><br><br>

        <button type="submit">Add Expense</button>
    </form>

<script>

// Load events into dropdown
window.onload = function() {
    fetch("/events")
    .then(res => res.json())
    .then(data => {
        const select = document.getElementById("eventSelect");
        select.innerHTML = "<option value=''>-- Select Event --</option>";

        data.forEach(event => {
            const option = document.createElement("option");
            option.value = event.event_id;
            option.textContent = event.event_name + " (ID: " + event.event_id + ")";
            select.appendChild(option);
        });
    });
};


// Submit expense
document.getElementById("expenseForm").addEventListener("submit", function(e){
    e.preventDefault();

    const event_id = document.getElementById("eventSelect").value;

    fetch("/add-expense", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            event_id: event_id,
            expense_type: document.getElementById("type").value,
            amount: document.getElementById("amount").value,
            expense_date: document.getElementById("date").value
        })
    })
    .then(res => res.text())
    .then(data => alert(data))
    .catch(err => alert("Error adding expense"));
});
</script>

</body>
</html>
