<!DOCTYPE html>
<html>
<head>
    <title>Assign Budget</title>
</head>
<body>
    <h2>Assign Budget to Event</h2>

    <form id="budgetForm">

        <!-- Event Dropdown -->
        <label>Select Event:</label><br>
        <select id="eventSelect" required></select>
        <br><br>

        <input type="number" id="amount" placeholder="Allocated Amount" required><br><br>

        <button type="submit">Assign Budget</button>
    </form>

<script>

// Load events into dropdown
window.onload = function() {
    fetch("/events")
    .then(res => res.json())
    .then(data => {
        const select = document.getElementById("eventSelect");
        select.innerHTML = "<option value=''>-- Select Event --</option>";

        data.forEach(event => {
            const option = document.createElement("option");
            option.value = event.event_id;
            option.textContent = event.event_name;
            select.appendChild(option);
        });
    });
};


// Submit budget
document.getElementById("budgetForm").addEventListener("submit", function(e){
    e.preventDefault();

    const event_id = document.getElementById("eventSelect").value;

    fetch("/assign-budget", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            event_id: event_id,
            allocated_amount: document.getElementById("amount").value
        })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.text();
    })
    .then(msg => alert(msg))
    .catch(() => alert("Budget already assigned or error occurred"));
});
</script>

</body>
</html>
