<!DOCTYPE html>
<html>
<head>
    <title>Assign Sponsor</title>
</head>
<body>

<h2>Assign Sponsor to Event</h2>

<form id="assignForm">

    <label>Select Sponsor:</label><br>
    <select id="sponsorSelect" required></select>
    <br><br>

    <label>Select Event:</label><br>
    <select id="eventSelect" required></select>
    <br><br>

    <input type="number" id="amount" placeholder="Sponsorship Amount" required>
    <br><br>

    <button type="submit">Assign Sponsorship</button>
</form>

<hr>

<h2>Sponsorship List</h2>
<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Sponsor</th>
            <th>Event</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>

// Load Sponsors Dropdown
function loadSponsors() {
    fetch("/sponsors")
    .then(res => res.json())
    .then(data => {
        const select = document.getElementById("sponsorSelect");
        select.innerHTML = "<option value=''>-- Select Sponsor --</option>";

        data.forEach(s => {
            select.innerHTML += 
                `<option value="${s.sponsor_id}">${s.sponsor_name}</option>`;
        });
    });
}

// Load Events Dropdown
function loadEvents() {
    fetch("/events")
    .then(res => res.json())
    .then(data => {
        const select = document.getElementById("eventSelect");
        select.innerHTML = "<option value=''>-- Select Event --</option>";

        data.forEach(e => {
            select.innerHTML += 
                `<option value="${e.event_id}">${e.event_name}</option>`;
        });
    });
}

// Load Sponsorship Table
function loadSponsorships() {
    fetch("/sponsorships")
    .then(res => res.json())
    .then(data => {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        data.forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td>${s.sponsorship_id}</td>
                    <td>${s.sponsor_name}</td>
                    <td>${s.event_name}</td>
                    <td>${s.amount}</td>
                </tr>
            `;
        });
    });
}

// Submit Assign Form
document.getElementById("assignForm").addEventListener("submit", function(e){
    e.preventDefault();

    fetch("/assign-sponsor", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            sponsor_id: document.getElementById("sponsorSelect").value,
            event_id: document.getElementById("eventSelect").value,
            amount: document.getElementById("amount").value
        })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadSponsorships();
    });
});

// Load everything on page load
window.onload = function() {
    loadSponsors();
    loadEvents();
    loadSponsorships();
};

</script>

</body>
</html>
